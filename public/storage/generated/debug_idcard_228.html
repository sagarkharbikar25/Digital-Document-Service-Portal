<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: Arial, Helvetica, sans-serif;
        background: #ffffff;
        padding-top: 10mm;
    }

    .card {
        width: 54mm;
        height: 86mm;
        margin: 0 auto;
        border: 1px solid #cfcfcf;
        border-radius: 5mm;
        background: #fff;
        overflow: hidden;
        position: relative;
    }

    .top {
        padding: 3px 4px 0 4px;
    }

    .top-table {
        width: 100%;
    }

    .top-table td {
        vertical-align: middle;
    }

    .logo-cell {
        width: 36px;
    }

    .title-big {
        font-size: 13pt;
        font-weight: 900;
        color: #1a1a55;
        line-height: 1.0;
        letter-spacing: 0.3px;
    }

    .title-sub {
        font-size: 4.8pt;
        font-weight: 700;
        color: #333;
        line-height: 1.2;
        text-transform: uppercase;
        margin-top: 1px;
    }

    .auto-strip {
        margin-top: 2px;
        background: #ea9f7f;
        color: #fff;
        text-align: center;
        font-size: 5.8pt;
        font-weight: bold;
        padding: 2px 0;
    }

    .photo-wrap {
        text-align: center;
        padding-top: 6px;
        padding-bottom: 4px;
    }

    .photo-box {
        width: 31mm;
        height: 31mm;
        border-radius: 50%;
        border: 2px solid #2c74b8;
        overflow: hidden;
        background: #dcecff;
        display: inline-block;
        text-align: center;
    }

    .name-row {
        width: 100%;
        padding: 0 4px 2px 4px;
    }

    .name-table {
        width: 100%;
    }

    .name-table td {
        font-size: 7pt;
        color: #111;
        vertical-align: top;
    }

    .name-label {
        width: 17mm;
        font-weight: normal;
    }

    .name-colon {
        width: 3mm;
        text-align: center;
    }

    .name-value {
        font-weight: normal;
    }

    .details {
        padding: 2px 4px 0 4px;
    }

    .details-table {
        width: 100%;
    }

    .details-table td {
        font-size: 6.4pt;
        color: #111;
        vertical-align: top;
        padding-bottom: 1.2px;
    }

    .lbl {
        width: 17mm;
        font-weight: bold;
        white-space: nowrap;
    }

    .colon {
        width: 3mm;
        text-align: center;
        font-weight: bold;
    }

    .val {
        word-break: break-word;
        font-weight: normal;
    }

    .address-cell {
        line-height: 1.05;
    }

    .bottom-zone {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 6mm;
        padding: 0 4px;
    }

    .bottom-table {
        width: 100%;
    }

    .bottom-table td {
        vertical-align: bottom;
    }

    .barcode-cell {
        width: 67%;
        text-align: left;
    }

    .barcode-text {
        font-family: monospace;
        font-size: 5.5pt;
        letter-spacing: 1px;
        margin-top: 1px;
        text-align: center;
    }

    .sign-cell {
        width: 33%;
        text-align: center;
        padding-left: 2px;
    }

    .sign-label {
        font-size: 5.5pt;
        color: #333;
        font-weight: bold;
        margin-top: 1px;
        line-height: 1.1;
    }

    .batch-strip {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 54mm;
        background: #e07020;
        color: #111;
        padding: 2px 5px;
        font-size: 7pt;
        font-weight: 900;
    }

    .batch-table {
        width: 100%;
    }

    .batch-left {
        text-align: left;
    }

    .batch-right {
        text-align: right;
    }
</style>
</head>
